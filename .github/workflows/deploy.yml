name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # אנחנו מזריקים את המשתנים ישירות לפקודה עם גרשיים למניעת שגיאות קידוד
          command: deploy --var CF_ACCESS_TEAM_DOMAIN:"${{ secrets.CF_ACCESS_TEAM_DOMAIN }}" --var CF_ACCESS_AUD:"${{ secrets.CF_ACCESS_AUD }}"
