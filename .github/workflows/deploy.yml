name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch: # מאפשר לך להריץ ידנית מה-Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        env:
          # מיפוי הסודות מגיטהאב למשתני סביבה זמניים בריצה
          TEAM_DOMAIN: ${{ secrets.CF_ACCESS_TEAM_DOMAIN }}
          AUD_TAG: ${{ secrets.CF_ACCESS_AUD }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          vars: |
            CF_ACCESS_TEAM_DOMAIN=${{ env.TEAM_DOMAIN }}
            CF_ACCESS_AUD=${{ env.AUD_TAG }}
